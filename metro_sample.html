<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 8 Customizable Start Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --fg: #fff;
            --dim: #555;
            --border: #1a1a1a;
            --card: #0d0d0d;
            --accent: #fff;
            --metro-bezier: cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .light-mode {
            --bg: #fff;
            --fg: #000;
            --dim: #aaa;
            --border: #e0e0e0;
            --card: #f5f5f5;
            --accent: #000;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg); color: var(--fg);
            transition: background-color 0.5s ease;
            user-select: none;
        }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            width: 40px; height: 40px;
            border: 1px solid var(--dim);
            background: var(--card);
            color: var(--fg);
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Space Mono', monospace;
            transition: background 0.2s;
        }
        .theme-toggle:hover { background: var(--border); }

        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('pictures/placeholder.png');
            background-size: cover; background-position: center;
            z-index: -2; filter: brightness(0.6);
            transition: transform 0.8s var(--metro-bezier), opacity 0.5s;
        }

        .dot-row {
            display: flex; gap: 6px; margin: 12px 0;
        }
        .dot-row .dot {
            width: 4px; height: 4px; border-radius: 50%;
            background: var(--dim);
        }

        header {
            position: absolute; top: 60px; left: 80px; z-index: 10;
            transition: opacity 0.4s;
        }
        h1.start-text {
            font-size: 56px; font-weight: 400; margin: 0;
            font-family: 'Space Mono', monospace;
        }
        h1.start-text::after {
            content: '';
            display: block;
            width: 60px; height: 3px;
            background: var(--accent);
            margin-top: 8px;
        }

        .user-section {
            position: absolute; top: 60px; right: 60px; z-index: 1000;
            transition: opacity 0.4s, visibility 0.4s;
        }
        .user-profile { display: flex; align-items: center; gap: 15px; cursor: pointer; padding: 5px 12px; transition: background 0.2s; }
        .user-profile:hover { background: var(--card); }
        .user-avatar { width: 40px; height: 40px; border: 2px solid var(--fg); background-image: url('https://github.com/wollydev24.png'); background-size: cover; }
        .user-menu {
            position: absolute; top: 100%; right: 0; width: 200px;
            background: var(--card); border: 1px solid var(--border); margin-top: 5px;
            display: none; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 1001;
        }
        .user-menu.active { display: flex; }
        .user-menu-item { padding: 12px 20px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .user-menu-item:last-child { border-bottom: none; }
        .user-menu-item:hover { background: var(--border); }

        .scene {
            perspective: 1500px; height: 100%; width: 100%;
            display: flex; align-items: center; padding-left: 80px;
            overflow-x: auto; overflow-y: hidden;
        }
        .scene::-webkit-scrollbar { height: 5px; }
        .scene::-webkit-scrollbar-thumb { background: var(--dim); }

        .start-screen { 
            display: grid;
            grid-template-rows: repeat(3, 120px);
            grid-auto-flow: column;
            grid-auto-columns: 120px;
            grid-gap: 10px;
            transform-style: preserve-3d; 
            transition: transform 0.8s var(--metro-bezier), opacity 0.6s; 
            padding-right: 100px;
        }

        .tile {
            position: relative; background-color: #1a1a1a; cursor: pointer;
            transform-style: preserve-3d; border: 2px solid var(--border);
            transition: border 0.2s, transform 0.1s, opacity 0.2s;
            width: 120px; height: 120px;
        }
        .tile:hover { border-color: var(--fg); }
        .tile.wide { grid-column: span 2; width: 250px; }
        .tile.dragging { opacity: 0.5; transform: scale(0.9); }
        .tile.selected { border: 1px dashed var(--fg); }
        .tile-label { position: absolute; bottom: 8px; left: 10px; font-size: 13px; pointer-events: none; font-family: 'Space Mono', monospace; }
        .tile-icon { position: absolute; top: 20px; left: 10px; font-size: 24px; pointer-events: none; font-family: 'Space Mono', monospace; opacity: 0.3; }

        @keyframes tileFlip {
            0% { transform: perspective(1500px) rotateY(0deg) scale(1); opacity: 1; }
            100% { transform: perspective(1500px) rotateY(90deg) scale(4); opacity: 0; }
        }
        .tile.flipping { animation: tileFlip 0.7s forwards var(--metro-bezier); z-index: 1000; pointer-events: none; }
        .start-screen.zoom-out { transform: translateZ(-300px) rotateY(10deg); opacity: 0; pointer-events: none; }

        .app-bar {
            position: fixed; bottom: -100px; left: 0; width: 100%; height: 100px;
            background: var(--card); z-index: 6000;
            display: flex; justify-content: center; align-items: center; gap: 40px;
            transition: bottom 0.3s var(--metro-bezier);
            border-top: 1px solid var(--border);
        }
        .app-bar.active { bottom: 0; }
        .bar-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
            opacity: 0.8; transition: opacity 0.2s;
        }
        .bar-item:hover { opacity: 1; }
        .bar-icon { width: 40px; height: 40px; border: 1px solid var(--fg); display: flex; align-items: center; justify-content: center; font-size: 16px; font-family: 'Space Mono', monospace; }
        .bar-label { font-size: 11px; font-family: 'Space Mono', monospace; }

        .app-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; display: none; flex-direction: column; padding: 60px 80px; box-sizing: border-box;
            transform: perspective(1500px) rotateY(-90deg) scale(0.8); transform-origin: center;
            transition: transform 0.6s var(--metro-bezier), opacity 0.4s; background: var(--bg);
        }
        .app-page.active { display: flex; opacity: 1; transform: perspective(1500px) rotateY(0deg) scale(1); }
        .app-header { display: flex; align-items: center; gap: 30px; margin-bottom: 40px; }
        .app-header h1 { font-family: 'Space Mono', monospace; font-weight: 400; }
        .back-btn { width: 45px; height: 45px; border: 1px solid var(--fg); background: none; color: var(--fg); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; }

        .charms-bar { position: fixed; top: 0; right: -100px; width: 100px; height: 100%; background: var(--card); border-left: 1px solid var(--border); z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px; transition: right 0.3s var(--metro-bezier); }
        .charms-bar.active { right: 0; }
        .charm-item { font-family: 'Space Mono', monospace; font-size: 14px; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
        .charm-item:hover { opacity: 1; }
        .charms-clock { position: fixed; bottom: 60px; left: -500px; background: var(--card); border: 1px solid var(--border); padding: 30px 50px; display: flex; gap: 30px; align-items: center; z-index: 4900; transition: left 0.4s var(--metro-bezier); }
        .charms-clock.active { left: 80px; }
        .clock-time { font-size: 100px; font-weight: 400; line-height: 1; font-family: 'Space Mono', monospace; letter-spacing: -5px; }
        .charms-trigger { position: fixed; top: 0; right: 0; width: 20px; height: 100px; z-index: 5100; }
        .charms-trigger.bottom { top: auto; bottom: 0; }

        .tile-menu {
            position: fixed; z-index: 3000;
            background: var(--card); border: 1px solid var(--border);
            display: none; flex-direction: column; min-width: 160px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .tile-menu.active { display: flex; }
        .menu-item { padding: 10px 16px; font-size: 13px; cursor: pointer; font-family: 'Space Mono', monospace; border-bottom: 1px solid var(--border); }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: var(--border); }
        .menu-item.active-size { text-decoration: underline; }

        @media (max-width: 768px) {
            header { left: 30px; top: 30px; }
            h1.start-text { font-size: 36px; }
            .user-section { top: 30px; right: 20px; }
            .user-name { display: none; }
            .scene { padding-left: 20px; }
            .start-screen {
                grid-template-rows: repeat(3, 100px);
                grid-auto-columns: 100px;
                padding-right: 40px;
            }
            .tile { width: 100px; height: 100px; }
            .tile.wide { width: 210px; }
            .app-page { padding: 30px 20px; }
            .charms-clock.active { left: 20px; }
            .charms-clock { padding: 20px 30px; }
            .clock-time { font-size: 60px; }
            .theme-toggle { top: 10px; right: 10px; width: 36px; height: 36px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="background" id="bg"></div>

    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">○</button>

    <header id="mainHeader">
        <h1 class="start-text">Start</h1>
        <div class="dot-row"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </header>

    <div class="user-section" id="userSection">
        <div class="user-profile" id="userProfileBtn">
            <span class="user-name" id="currentUserName">WollyDev24</span>
            <div class="user-avatar" id="currentUserAvatar"></div>
        </div>
        <div class="user-menu" id="userMenu">
            <div class="user-menu-item" onclick="switchUser()">Switch User</div>
            <div class="user-menu-item">Lock</div>
        </div>
    </div>

    <div class="scene">
        <div class="start-screen" id="startScreen">
            <!-- Tiles populated by JS -->
        </div>
    </div>

    <!-- App Pages -->
    <div class="app-page" id="settingsApp">
        <div class="app-header"><button class="back-btn" onclick="closeApp()">←</button><h1>Settings</h1></div>
        <div class="dot-row"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
    <div class="app-page" id="mailApp">
        <div class="app-header"><button class="back-btn" onclick="closeApp()">←</button><h1>Mail</h1></div>
        <div class="dot-row"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
    <div class="app-page" id="browserApp">
        <div class="app-header"><button class="back-btn" onclick="closeApp()">←</button><h1>Internet Explorer</h1></div>
        <div class="dot-row"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>

    <!-- App Bar -->
    <div class="app-bar" id="appBar">
        <div class="bar-item" onclick="resizeSelectedTile()">
            <div class="bar-icon">□</div>
            <div class="bar-label">Resize</div>
        </div>
        <div class="bar-item" onclick="unpinSelectedTile()">
            <div class="bar-icon">✕</div>
            <div class="bar-label">Unpin</div>
        </div>
    </div>

    <!-- Charms -->
    <div class="charms-trigger" onmouseenter="showCharms()"></div>
    <div class="charms-trigger bottom" onmouseenter="showCharms()"></div>
    <div class="charms-bar" id="charmsBar" onmouseleave="hideCharms()">
        <div class="charm-item" onclick="closeApp(); hideCharms();">Start</div>
        <div class="charm-item" onclick="openApp('settings'); hideCharms();">Settings</div>
    </div>
    <div class="charms-clock" id="charmsClock"><div class="clock-time" id="clockTime">12:00</div></div>

    <script>
        const startScreen = document.getElementById('startScreen');
        const tileMenu = document.getElementById('tileMenu');
        let selectedTileId = null;

        let tileData = [
            { id: 'settings', name: 'PC settings', color: '#1a1a1a', size: 'wide' },
            { id: 'mail', name: 'Mail', color: '#1a1a1a', size: 'square' },
            { id: 'music', name: 'Music', color: '#1a1a1a', size: 'square' },
            { id: 'photos', name: 'Photos', color: '#1a1a1a', size: 'large' },
            { id: 'maps', name: 'Maps', color: '#1a1a1a', size: 'square' },
            { id: 'browser', name: 'Internet Explorer', color: '#1a1a1a', size: 'square' },
            { id: 'weather', name: 'Weather', color: '#1a1a1a', size: 'square' },
            { id: 'news', name: 'News', color: '#1a1a1a', size: 'wide' }
        ];

        function renderTiles() {
            startScreen.innerHTML = '';
            tileData.forEach((tile, index) => {
                const div = document.createElement('div');
                div.className = `tile ${tile.size}`;
                div.id = `tile-${tile.id}`;
                div.dataset.id = tile.id;
                div.style.backgroundColor = tile.color;
                div.innerHTML = `<div class="tile-icon">◈</div><div class="tile-label">${tile.name}</div>`;
                
                div.onclick = (e) => { 
                    if(tileMenu.classList.contains('active')) return;
                    openApp(tile.id); 
                };

                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    showTileMenu(tile.id, e.clientX, e.clientY);
                };
                
                div.draggable = true;

                div.ondragstart = (e) => {
                    e.dataTransfer.setData('text/plain', tile.id);
                    div.classList.add('dragging');
                    const img = new Image();
                    img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
                    e.dataTransfer.setDragImage(img, 0, 0);
                    hideTileMenu();
                };

                div.ondragend = () => {
                    div.classList.remove('dragging');
                    saveNewOrder();
                };

                div.ondragover = (e) => {
                    e.preventDefault();
                    const draggingElement = document.querySelector('.dragging');
                    if (!draggingElement || draggingElement === div) return;

                    const container = div.parentNode;
                    const children = Array.from(container.children);
                    const draggingIndex = children.indexOf(draggingElement);
                    const targetIndex = children.indexOf(div);

                    if (draggingIndex < targetIndex) {
                        container.insertBefore(draggingElement, div.nextSibling);
                    } else {
                        container.insertBefore(draggingElement, div);
                    }
                };

                startScreen.appendChild(div);
            });
        }

        function saveNewOrder() {
            const currentTiles = Array.from(startScreen.children);
            const newOrder = currentTiles.map(el => {
                const id = el.dataset.id;
                return tileData.find(t => t.id === id);
            }).filter(t => t !== undefined);
            tileData = newOrder;
        }

        function showTileMenu(id, x, y) {
            selectedTileId = id;
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
            const tileEl = document.getElementById(`tile-${id}`);
            tileEl.classList.add('selected');

            const rect = tileEl.getBoundingClientRect();
            tileMenu.style.left = `${rect.left}px`;
            tileMenu.style.top = `${rect.bottom + 5}px`;
            
            const tile = tileData.find(t => t.id === id);
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active-size');
                if (item.innerText.toLowerCase().includes(tile.size)) {
                    item.classList.add('active-size');
                }
            });

            tileMenu.classList.add('active');
            document.getElementById('appBar').classList.add('active');
        }

        function hideTileMenu() {
            tileMenu.classList.remove('active');
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
            document.getElementById('appBar').classList.remove('active');
        }

        function setTileSize(size) {
            const tile = tileData.find(t => t.id === selectedTileId);
            if (tile) {
                tile.size = size;
                renderTiles();
            }
            hideTileMenu();
        }

        function resizeSelectedTile() {
            const tile = tileData.find(t => t.id === selectedTileId);
            if (!tile) return;
            const sizes = ['square', 'wide', 'large'];
            const current = sizes.indexOf(tile.size);
            tile.size = sizes[(current + 1) % sizes.length];
            renderTiles();
            hideTileMenu();
        }

        function unpinSelectedTile() {
            tileData = tileData.filter(t => t.id !== selectedTileId);
            hideTileMenu();
            renderTiles();
        }

        document.onclick = (e) => {
            if (!e.target.closest('.tile') && !e.target.closest('.tile-menu') && !e.target.closest('.app-bar') && !e.target.closest('.bar-item')) {
                hideTileMenu();
            }
        };

        let currentApp = null;
        function openApp(id) {
            const tile = document.getElementById(`tile-${id}`);
            tile.classList.add('flipping');
            setTimeout(() => {
                document.getElementById('startScreen').classList.add('zoom-out');
                document.getElementById('mainHeader').style.opacity = '0';
                document.getElementById('userSection').style.opacity = '0';
            }, 100);
            setTimeout(() => {
                currentApp = document.getElementById(id + 'App') || document.getElementById('settingsApp');
                currentApp.style.display = 'flex';
                setTimeout(() => currentApp.classList.add('active'), 10);
            }, 300);
        }

        function closeApp() {
            if (!currentApp) return;
            currentApp.classList.remove('active');
            setTimeout(() => {
                currentApp.style.display = 'none';
                document.getElementById('startScreen').classList.remove('zoom-out');
                document.getElementById('mainHeader').style.opacity = '1';
                document.getElementById('userSection').style.opacity = '1';
                document.querySelectorAll('.tile').forEach(t => t.classList.remove('flipping'));
                currentApp = null;
            }, 400);
        }

        function showCharms() { charmsBar.classList.add('active'); charmsClock.classList.add('active'); updateClock(); }
        function hideCharms() { charmsBar.classList.remove('active'); charmsClock.classList.remove('active'); }
        function updateClock() { document.getElementById('clockTime').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.getElementById('themeToggle');
            btn.innerText = document.body.classList.contains('light-mode') ? '●' : '○';
            localStorage.setItem('metroTheme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        if (localStorage.getItem('metroTheme') === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('themeToggle').innerText = '●';
        }

        renderTiles();
    </script>
</body>
</html>
