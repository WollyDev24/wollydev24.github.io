<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 8 Customizable Start Screen</title>
    <style>
        @font-face {
            font-family: 'Segoe UI';
            src: local('Segoe UI Light'), local('Segoe UI');
            font-weight: 100;
        }

        :root {
            --win-bg: #004d60;
            --tile-blue: #00a1f1;
            --tile-purple: #4e148c;
            --tile-green: #00a300;
            --tile-orange: #ff8000;
            --tile-red: #e51400;
            --tile-teal: #00aba9;
            --metro-bezier: cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--win-bg); color: white;
            transition: background-color 0.5s ease;
            user-select: none;
        }

        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('pictures/placeholder.png');
            background-size: cover; background-position: center;
            z-index: -1; filter: brightness(0.6);
            transition: transform 0.8s var(--metro-bezier), opacity 0.5s;
        }

        header {
            position: absolute; top: 60px; left: 80px; z-index: 10;
            transition: opacity 0.4s;
        }
        h1.start-text { font-size: 56px; font-weight: 100; margin: 0; }

        /* User Profile */
        .user-section {
            position: absolute; top: 60px; right: 60px; z-index: 1000;
            transition: opacity 0.4s, visibility 0.4s;
        }
        .user-profile { display: flex; align-items: center; gap: 15px; cursor: pointer; padding: 5px 12px; transition: background 0.2s; }
        .user-profile:hover { background: rgba(255,255,255,0.1); }
        .user-avatar { width: 40px; height: 40px; border: 2px solid white; background-image: url('https://github.com/wollydev24.png'); background-size: cover; }
        .user-menu {
            position: absolute; top: 100%; right: 0; width: 200px;
            background: #1f1f1f; border: 1px solid #333; margin-top: 5px;
            display: none; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 1001;
        }
        .user-menu.active { display: flex; }
        .user-menu-item { padding: 12px 20px; font-size: 14px; cursor: pointer; }
        .user-menu-item:hover { background: #333; }

        /* Tile Scene */
        .scene {
            perspective: 1500px; height: 100%; width: 100%;
            display: flex; align-items: center; padding-left: 80px;
            overflow-x: auto; overflow-y: hidden;
        }
        .scene::-webkit-scrollbar { height: 5px; }
        .scene::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

        .start-screen { 
            display: grid;
            grid-template-rows: repeat(3, 120px);
            grid-auto-flow: column;
            grid-auto-columns: 120px;
            grid-gap: 10px;
            transform-style: preserve-3d; 
            transition: transform 0.8s var(--metro-bezier), opacity 0.6s; 
            padding-right: 100px;
        }

        .tile {
            position: relative; background-color: var(--tile-blue); cursor: pointer;
            transform-style: preserve-3d; border: 2px solid transparent;
            transition: border 0.2s, transform 0.1s, opacity 0.2s;
            width: 120px; height: 120px;
        }
        .tile:hover { border-color: rgba(255,255,255,0.3); }
        .tile.wide { grid-column: span 2; width: 250px; }
        .tile.dragging { opacity: 0.5; transform: scale(0.9); }
        .tile.selected { border: 2px solid white; }
        .tile-label { position: absolute; bottom: 8px; left: 10px; font-size: 13px; pointer-events: none; }

        @keyframes tileFlip {
            0% { transform: perspective(1500px) rotateY(0deg) scale(1); opacity: 1; }
            100% { transform: perspective(1500px) rotateY(90deg) scale(4); opacity: 0; }
        }
        .tile.flipping { animation: tileFlip 0.7s forwards var(--metro-bezier); z-index: 1000; pointer-events: none; }
        .start-screen.zoom-out { transform: translateZ(-300px) rotateY(10deg); opacity: 0; pointer-events: none; }

        /* Customization Bar */
        .app-bar {
            position: fixed; bottom: -100px; left: 0; width: 100%; height: 100px;
            background: rgba(15, 15, 15, 0.95); z-index: 6000;
            display: flex; justify-content: center; align-items: center; gap: 40px;
            transition: bottom 0.3s var(--metro-bezier);
            border-top: 1px solid #333;
        }
        .app-bar.active { bottom: 0; }
        .bar-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
            opacity: 0.8; transition: opacity 0.2s;
        }
        .bar-item:hover { opacity: 1; }
        .bar-icon { width: 40px; height: 40px; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .bar-label { font-size: 12px; }

        /* Apps */
        .app-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; display: none; flex-direction: column; padding: 60px 80px; box-sizing: border-box;
            transform: perspective(1500px) rotateY(-90deg) scale(0.8); transform-origin: center;
            transition: transform 0.6s var(--metro-bezier), opacity 0.4s; background: #1f1f1f;
        }
        .app-page.active { display: flex; opacity: 1; transform: perspective(1500px) rotateY(0deg) scale(1); }
        .app-header { display: flex; align-items: center; gap: 30px; margin-bottom: 40px; }
        .back-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; background: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Charms Bar */
        .charms-bar { position: fixed; top: 0; right: -100px; width: 100px; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px; transition: right 0.3s var(--metro-bezier); }
        .charms-bar.active { right: 0; }
        .charms-clock { position: fixed; bottom: 60px; left: -500px; background: rgba(0, 0, 0, 0.8); padding: 30px 50px; display: flex; gap: 30px; align-items: center; z-index: 4900; transition: left 0.4s var(--metro-bezier); border-left: 10px solid var(--tile-blue); }
        .charms-clock.active { left: 80px; }
        .clock-time { font-size: 100px; font-weight: 100; line-height: 1; }
        .charms-trigger { position: fixed; top: 0; right: 0; width: 20px; height: 100px; z-index: 5100; }
        .charms-trigger.bottom { top: auto; bottom: 0; }

    </style>
</head>
<body>

    <div class="background" id="bg"></div>

    <header id="mainHeader">
        <h1 class="start-text">Start</h1>
    </header>

    <div class="user-section" id="userSection">
        <div class="user-profile" id="userProfileBtn">
            <span class="user-name" id="currentUserName">WollyDev24</span>
            <div class="user-avatar" id="currentUserAvatar"></div>
        </div>
        <div class="user-menu" id="userMenu">
            <div class="user-menu-item" onclick="switchUser()">Switch User</div>
            <div class="user-menu-item">Lock</div>
        </div>
    </div>

    <div class="scene">
        <div class="start-screen" id="startScreen">
            <!-- Tiles populated by JS -->
        </div>
    </div>

    <!-- App Pages (Placeholder structures) -->
    <div class="app-page" id="settingsApp">
        <div class="app-header"><button class="back-btn" onclick="closeApp()">←</button><h1>Settings</h1></div>
    </div>
    <div class="app-page" id="mailApp">
        <div class="app-header"><button class="back-btn" onclick="closeApp()">←</button><h1>Mail</h1></div>
    </div>
    <div class="app-page" id="browserApp">
        <div class="app-header"><button class="back-btn" onclick="closeApp()">←</button><h1>Internet Explorer</h1></div>
    </div>

    <!-- App Bar (Customization) -->
    <div class="app-bar" id="appBar">
        <div class="bar-item" onclick="resizeSelectedTile()">
            <div class="bar-icon">↔️</div>
            <div class="bar-label">Resize</div>
        </div>
        <div class="bar-item" onclick="unpinSelectedTile()">
            <div class="bar-icon">📌</div>
            <div class="bar-label">Unpin</div>
        </div>
    </div>

    <!-- Charms -->
    <div class="charms-trigger" onmouseenter="showCharms()"></div>
    <div class="charms-trigger bottom" onmouseenter="showCharms()"></div>
    <div class="charms-bar" id="charmsBar" onmouseleave="hideCharms()">
        <div class="charm-item" onclick="closeApp(); hideCharms();">Start</div>
        <div class="charm-item" onclick="openApp('settings'); hideCharms();">Settings</div>
    </div>
    <div class="charms-clock" id="charmsClock"><div class="clock-time" id="clockTime">12:00</div></div>

    <script>
        const startScreen = document.getElementById('startScreen');
        const tileMenu = document.getElementById('tileMenu');
        let selectedTileId = null;

        let tileData = [
            { id: 'settings', name: 'PC settings', color: '#004d60', size: 'wide' },
            { id: 'mail', name: 'Mail', color: '--tile-blue', size: 'square' },
            { id: 'music', name: 'Music', color: '--tile-purple', size: 'square' },
            { id: 'photos', name: 'Photos', color: '--tile-orange', size: 'large' },
            { id: 'maps', name: 'Maps', color: '--tile-red', size: 'square' },
            { id: 'browser', name: 'Internet Explorer', color: '#0078d7', size: 'square' },
            { id: 'weather', name: 'Weather', color: '#2b5797', size: 'square' },
            { id: 'news', name: 'News', color: '#e3a21a', size: 'wide' }
        ];

        function renderTiles() {
            startScreen.innerHTML = '';
            tileData.forEach((tile, index) => {
                const div = document.createElement('div');
                div.className = `tile ${tile.size}`;
                div.id = `tile-${tile.id}`;
                div.dataset.id = tile.id;
                div.style.backgroundColor = tile.color.startsWith('--') ? `var(${tile.color})` : tile.color;
                div.innerHTML = `<div class="tile-label">${tile.name}</div>`;
                
                // Click Events
                div.onclick = (e) => { 
                    if(tileMenu.classList.contains('active')) return;
                    openApp(tile.id); 
                };

                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    showTileMenu(tile.id, e.clientX, e.clientY);
                };
                
                // Drag and Drop Logic
                div.draggable = true;

                div.ondragstart = (e) => {
                    e.dataTransfer.setData('text/plain', tile.id);
                    div.classList.add('dragging');
                    const img = new Image();
                    img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
                    e.dataTransfer.setDragImage(img, 0, 0);
                    hideTileMenu();
                };

                div.ondragend = () => {
                    div.classList.remove('dragging');
                    saveNewOrder();
                };

                div.ondragover = (e) => {
                    e.preventDefault();
                    const draggingElement = document.querySelector('.dragging');
                    if (!draggingElement || draggingElement === div) return;

                    const container = div.parentNode;
                    const children = Array.from(container.children);
                    const draggingIndex = children.indexOf(draggingElement);
                    const targetIndex = children.indexOf(div);

                    if (draggingIndex < targetIndex) {
                        container.insertBefore(draggingElement, div.nextSibling);
                    } else {
                        container.insertBefore(draggingElement, div);
                    }
                };

                startScreen.appendChild(div);
            });
        }

        function saveNewOrder() {
            const currentTiles = Array.from(startScreen.children);
            const newOrder = currentTiles.map(el => {
                const id = el.dataset.id;
                return tileData.find(t => t.id === id);
            }).filter(t => t !== undefined);
            tileData = newOrder;
        }

        function showTileMenu(id, x, y) {
            selectedTileId = id;
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
            const tileEl = document.getElementById(`tile-${id}`);
            tileEl.classList.add('selected');

            // Position menu under tile
            const rect = tileEl.getBoundingClientRect();
            tileMenu.style.left = `${rect.left}px`;
            tileMenu.style.top = `${rect.bottom + 5}px`;
            
            // Mark active size
            const tile = tileData.find(t => t.id === id);
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active-size');
                if (item.innerText.toLowerCase().includes(tile.size)) {
                    item.classList.add('active-size');
                }
            });

            tileMenu.classList.add('active');
        }

        function hideTileMenu() {
            tileMenu.classList.remove('active');
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
        }

        function setTileSize(size) {
            const tile = tileData.find(t => t.id === selectedTileId);
            if (tile) {
                tile.size = size;
                renderTiles();
            }
            hideTileMenu();
        }

        function unpinSelectedTile() {
            tileData = tileData.filter(t => t.id !== selectedTileId);
            hideTileMenu();
            renderTiles();
        }

        // Global Clicks
        document.onclick = (e) => {
            if (!e.target.closest('.tile') && !e.target.closest('.tile-menu')) {
                hideTileMenu();
            }
        };

        // Standard App Logic
        let currentApp = null;
        function openApp(id) {
            const tile = document.getElementById(`tile-${id}`);
            tile.classList.add('flipping');
            setTimeout(() => {
                document.getElementById('startScreen').classList.add('zoom-out');
                document.getElementById('mainHeader').style.opacity = '0';
                document.getElementById('userSection').style.opacity = '0';
            }, 100);
            setTimeout(() => {
                currentApp = document.getElementById(id + 'App') || document.getElementById('settingsApp');
                currentApp.style.display = 'flex';
                setTimeout(() => currentApp.classList.add('active'), 10);
            }, 300);
        }

        function closeApp() {
            if (!currentApp) return;
            currentApp.classList.remove('active');
            setTimeout(() => {
                currentApp.style.display = 'none';
                document.getElementById('startScreen').classList.remove('zoom-out');
                document.getElementById('mainHeader').style.opacity = '1';
                document.getElementById('userSection').style.opacity = '1';
                document.querySelectorAll('.tile').forEach(t => t.classList.remove('flipping'));
                currentApp = null;
            }, 400);
        }

        function showCharms() { charmsBar.classList.add('active'); charmsClock.classList.add('active'); updateClock(); }
        function hideCharms() { charmsBar.classList.remove('active'); charmsClock.classList.remove('active'); }
        function updateClock() { document.getElementById('clockTime').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }

        renderTiles();
    </script>
</body>
</html>
