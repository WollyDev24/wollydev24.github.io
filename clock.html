<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Settings Clock</title>
    
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --clock-color: #ffffff;
            --font-weight: 700;
            --clock-size: 12rem;
            --clock-opacity: 1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: transparent; /* Background removed */
            color: var(--clock-color);
            font-family: 'M PLUS Rounded 1c', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        /* --- Search Bar UI --- */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px 24px;
            width: 450px;
            max-width: 90vw;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 0.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-container:focus-within {
            width: 550px;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
            transform: translateY(-5px);
        }

        .google-icon {
            width: 22px;
            height: 22px;
            margin-right: 15px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            transition: transform 0.4s ease;
        }

        .search-container:hover .google-icon {
            transform: scale(1.1);
        }

        #search-input {
            background: none;
            border: none;
            color: white;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 400;
            width: 100%;
            outline: none;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
        }

        #date {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        #clock {
            font-size: var(--clock-size);
            font-weight: var(--font-weight);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            opacity: var(--clock-opacity);
        }

        .seconds {
            font-size: 0.45em;
            opacity: 0.6;
            margin-left: 0.05em;
        }

        /* --- Account Switcher UI --- */
        .account-wrapper {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 200;
        }

        .account-container {
            width: 42px;
            height: 42px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .account-container:hover {
            transform: scale(1.05);
        }

        .pfp {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 2;
        }

        .g1-ring {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            padding: 2px;
            background: conic-gradient(#4285f4, #ea4335, #fbbc05, #34a853, #4285f4);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
            animation: ring-rotate 4s linear infinite;
        }

        .g1-ring.active {
            opacity: 1;
        }

        @keyframes ring-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .account-menu {
            position: absolute;
            top: 55px;
            right: 0;
            width: 280px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
        }

        .account-wrapper:hover .account-menu {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0) scale(1);
        }

        .menu-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 5px;
        }

        .menu-pfp {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .menu-info { display: flex; flex-direction: column; }
        .menu-name { font-weight: 700; font-size: 1rem; }
        .menu-email { font-size: 0.75rem; opacity: 0.6; }

        .menu-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 15px 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* --- Ghost Settings UI --- */
        .settings-wrapper {
            position: fixed;
            bottom: 25px;
            left: 25px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            z-index: 100;
        }

        .gear-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            cursor: pointer;
        }

        .bubble-bg {
            position: absolute;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 50%;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: -1;
            opacity: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gear-icon {
            width: 28px;
            height: 28px;
            opacity: 0.3;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            fill: var(--clock-color);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .settings-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 280px;
            max-height: 80vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .settings-panel::-webkit-scrollbar { display: none; }

        .profile-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            width: 100%;
            transition: all 0.3s;
        }

        .profile-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .pfp-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }

        .pfp-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .pfp-option:hover {
            transform: scale(1.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .pfp-option.active {
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .custom-pfp-trigger {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.2);
        }

        .custom-pfp-trigger:hover {
            background: rgba(255, 255, 255, 0.15);
            border-style: solid;
        }

        /* Hover States */
        .settings-wrapper:hover .gear-icon {
            opacity: 1;
            transform: rotate(180deg) scale(1.1);
        }

        .settings-wrapper:hover .bubble-bg {
            width: 55px;
            height: 55px;
            opacity: 1;
            background: rgba(255, 255, 255, 0.15);
            animation: blob-morph 4s infinite alternate cubic-bezier(0.37, 0, 0.63, 1);
        }

        @keyframes blob-morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            33% { border-radius: 70% 30% 50% 50% / 30% 60% 40% 70%; }
            66% { border-radius: 30% 70% 70% 30% / 50% 40% 70% 50%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }

        @keyframes panel-blob-morph {
            0% { border-radius: 24px 40px 24px 40px; }
            33% { border-radius: 40px 24px 50px 24px; }
            66% { border-radius: 24px 50px 24px 40px; }
            100% { border-radius: 40px 24px 40px 24px; }
        }

        .settings-wrapper:hover .settings-panel {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0) scale(1);
            animation: panel-blob-morph 6s infinite alternate ease-in-out;
        }

        .settings-header {
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            opacity: 0.9;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        /* Input Styling */
        .setting-item { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }

        .setting-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            opacity: 0.5; 
            font-weight: 700;
        }

        .value-display {
            font-size: 0.7rem;
            font-family: monospace;
            opacity: 0.8;
        }

        /* Custom Slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
            transition: background 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #ffffff;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.3);
        }

        .color-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 5px;
        }

        .color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .color-swatch:hover {
            transform: scale(1.3) rotate(15deg);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .color-swatch.active {
            border-color: #ffffff;
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--clock-color);
        }

        #custom-color-btn {
            background-size: 200% 200% !important;
            animation: custom-gradient 3s linear infinite;
        }

        @keyframes custom-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .checkbox-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .checkbox-item { 
            display: flex;
            align-items: center; 
            gap: 8px; 
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .checkbox-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .checkbox-item input {
            cursor: pointer;
            accent-color: #ffffff;
        }

        .checkbox-item label {
            cursor: pointer;
            margin: 0;
            opacity: 0.8;
            text-transform: none;
            letter-spacing: 0;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="account-wrapper">
        <div class="account-container" id="account-trigger">
            <div class="g1-ring" id="g1-ring"></div>
            <img src="pictures/picture.jpg" class="pfp" id="display-pfp" alt="Profile">
        </div>

        <div class="account-menu">
            <div class="menu-header">
                <img src="pictures/picture.jpg" class="menu-pfp" id="menu-pfp" alt="Profile">
                <div class="menu-info">
                    <div class="menu-name" id="display-name">Wolly</div>
                    <div class="menu-email">Personal Account</div>
                </div>
            </div>
            <div class="menu-divider"></div>
            <div class="menu-item" id="edit-profile-btn">
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
                Manage Profile
            </div>
        </div>
    </div>

    <div class="container">
        <div id="date">Monday, April 13</div>
        <div id="clock">00:00<span class="seconds">00</span></div>
        <div class="search-container">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <input type="text" id="search-input" placeholder="Search Google..." autocomplete="off">
        </div>
    </div>

    <div class="settings-wrapper">
        <div class="gear-container">
            <div class="bubble-bg"></div>
            <svg class="gear-icon" viewBox="0 0 24 24">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.91,7.62,6.29L5.23,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.72,8.87 c-0.11,0.21-0.06,0.47,0.12,0.61l2.03,1.58C4.84,11.36,4.81,11.68,4.81,12c0,0.32,0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.11-0.21,0.06-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
            </svg>
        </div>

        <div class="settings-panel">
            <div class="settings-header">Profile Settings</div>
            <div class="setting-item">
                <label>Display Name</label>
                <input type="text" id="name-input" class="profile-input" placeholder="Wolly">
            </div>
            <div class="setting-item">
                <label>Profile Picture</label>
                <div class="pfp-grid">
                    <img src="pictures/picture.jpg" class="pfp-option active" data-src="pictures/picture.jpg" title="Default">
                    <img src="pictures/telegram_icon.jpg" class="pfp-option" data-src="pictures/telegram_icon.jpg" title="Telegram">
                    <img src="pictures/s8.png" class="pfp-option" data-src="pictures/s8.png" title="S8">
                    <img src="pictures/s8plus.png" class="pfp-option" data-src="pictures/s8plus.png" title="S8+">
                    <div class="pfp-option custom-pfp-trigger" id="custom-pfp-btn" title="Upload Custom">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </div>
                </div>
                <input type="file" id="pfp-upload" accept="image/*" style="display: none;">
            </div>
            <div class="setting-item">
                <div class="checkbox-item">
                    <input type="checkbox" id="g1-toggle">
                    <label for="g1-toggle">Google One Ring</label>
                </div>
            </div>

            <div class="menu-divider" style="margin: 5px 0 10px 0;"></div>

            <div class="settings-header">Clock Settings</div>
            
            <div class="setting-item">
                <div class="setting-label-row">
                    <label>Thickness</label>
                    <span class="value-display" id="weight-val">Bold</span>
                </div>
                <input type="range" id="weight-slider" min="0" max="3" step="1" value="2">
            </div>

            <div class="setting-item">
                <div class="setting-label-row">
                    <label>Clock Size</label>
                    <span class="value-display" id="size-val">12rem</span>
                </div>
                <input type="range" id="size-slider" min="5" max="25" step="0.5" value="12">
            </div>

            <div class="setting-item">
                <div class="setting-label-row">
                    <label>Opacity</label>
                    <span class="value-display" id="opacity-val">100%</span>
                </div>
                <input type="range" id="opacity-slider" min="10" max="100" step="5" value="100">
            </div>
            
            <div class="setting-item">
                <div class="setting-label-row">
                    <label>Clock Color</label>
                    <span class="value-display" id="color-val">White</span>
                </div>
                <div class="color-presets">
                    <div class="color-swatch active" style="background: #ffffff;" data-color="#ffffff" title="White"></div>
                    <div class="color-swatch" style="background: #ff5f5f;" data-color="#ff5f5f" title="Sunset"></div>
                    <div class="color-swatch" style="background: #5fffaf;" data-color="#5fffaf" title="Mint"></div>
                    <div class="color-swatch" style="background: #5fafff;" data-color="#5fafff" title="Sky"></div>
                    <div class="color-swatch" style="background: #af5fff;" data-color="#af5fff" title="Lavender"></div>
                    <div class="color-swatch" style="background: #fffb5f;" data-color="#fffb5f" title="Gold"></div>
                    <div class="color-swatch" id="custom-color-btn" style="background: linear-gradient(45deg, #ff0000, #ff00ff, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000);" title="Custom"></div>
                </div>
                <input type="color" id="color-picker" value="#ffffff" style="display: none;">
            </div>

            <div class="checkbox-row">
                <div class="checkbox-item">
                    <input type="checkbox" id="date-toggle" checked>
                    <label for="date-toggle">Date</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="seconds-toggle" checked>
                    <label for="seconds-toggle">Seconds</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="format-toggle" checked>
                    <label for="format-toggle">24h</label>
                </div>
            </div>
        </div>
    </div>

    <script>
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const weightSlider = document.getElementById('weight-slider');
        const weightVal = document.getElementById('weight-val');
        const sizeSlider = document.getElementById('size-slider');
        const sizeVal = document.getElementById('size-val');
        const opacitySlider = document.getElementById('opacity-slider');
        const opacityVal = document.getElementById('opacity-val');
        const colorPicker = document.getElementById('color-picker');
        const colorValSpan = document.getElementById('color-val');
        const colorSwatches = document.querySelectorAll('.color-swatch');
        const customColorBtn = document.getElementById('custom-color-btn');
        const dateToggle = document.getElementById('date-toggle');
        const secondsToggle = document.getElementById('seconds-toggle');
        const formatToggle = document.getElementById('format-toggle');
        const searchInput = document.getElementById('search-input');
        const nameInput = document.getElementById('name-input');
        const g1Toggle = document.getElementById('g1-toggle');
        const displayName = document.getElementById('display-name');
        const g1Ring = document.getElementById('g1-ring');
        const editProfileBtn = document.getElementById('edit-profile-btn');
        const pfpOptions = document.querySelectorAll('.pfp-option');
        const displayPfp = document.getElementById('display-pfp');
        const menuPfp = document.getElementById('menu-pfp');

        const weights = [300, 400, 700, 800];
        const weightNames = ['Light', 'Regular', 'Bold', 'Black'];

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            let ampmHtml = '';
            if (!formatToggle.checked) {
                const ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12;
                h = h ? h : 12;
                ampmHtml = `<span class="seconds" style="margin-left: 10px; font-size: 0.35em;">${ampm}</span>`;
            }
            
            const hStr = String(h).padStart(2, '0');
            let secondsHtml = secondsToggle.checked ? `<span class="seconds">${s}</span>` : '';
            
            clockEl.innerHTML = `${hStr}:${m}${secondsHtml}${ampmHtml}`;
            
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            dateEl.innerText = now.toLocaleDateString(undefined, options);
        }

        weightSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            document.documentElement.style.setProperty('--font-weight', weights[val]);
            weightVal.innerText = weightNames[val];
        });

        sizeSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            document.documentElement.style.setProperty('--clock-size', val + 'rem');
            sizeVal.innerText = val + 'rem';
        });

        opacitySlider.addEventListener('input', (e) => {
            const val = e.target.value;
            document.documentElement.style.setProperty('--clock-opacity', val / 100);
            opacityVal.innerText = val + '%';
        });

        function updateClockColor(color, name) {
            document.documentElement.style.setProperty('--clock-color', color);
            colorValSpan.innerText = name;
        }

        colorSwatches.forEach(swatch => {
            swatch.addEventListener('click', () => {
                if (swatch.id === 'custom-color-btn') {
                    colorPicker.click();
                } else {
                    const color = swatch.dataset.color;
                    const name = swatch.title;
                    updateClockColor(color, name);
                    
                    colorSwatches.forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                }
            });
        });

        colorPicker.addEventListener('input', (e) => {
            updateClockColor(e.target.value, 'Custom');
            colorSwatches.forEach(s => s.classList.remove('active'));
            customColorBtn.classList.add('active');
        });

        dateToggle.addEventListener('change', (e) => {
            dateEl.style.visibility = e.target.checked ? 'visible' : 'hidden';
            dateEl.style.height = e.target.checked ? 'auto' : '0';
            dateEl.style.margin = e.target.checked ? '0 0 0.5rem 0' : '0';
        });

        secondsToggle.addEventListener('change', updateClock);
        formatToggle.addEventListener('change', updateClock);

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== '') {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(e.target.value)}`;
            }
        });

        // Profile Logic
        nameInput.addEventListener('input', (e) => {
            displayName.innerText = e.target.value || 'Wolly';
        });

        g1Toggle.addEventListener('change', (e) => {
            if (e.target.checked) g1Ring.classList.add('active');
            else g1Ring.classList.remove('active');
        });

        editProfileBtn.addEventListener('click', () => {
            nameInput.focus();
        });

        const pfpUpload = document.getElementById('pfp-upload');
        const customPfpBtn = document.getElementById('custom-pfp-btn');

        pfpOptions.forEach(option => {
            option.addEventListener('click', () => {
                if (option.id === 'custom-pfp-btn') {
                    pfpUpload.click();
                } else {
                    const src = option.dataset.src;
                    updateAllPfps(src);
                    
                    pfpOptions.forEach(opt => opt.classList.remove('active'));
                    option.classList.add('active');
                }
            });
        });

        pfpUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const src = event.target.result;
                    updateAllPfps(src);
                    
                    // Mark custom button as active
                    pfpOptions.forEach(opt => opt.classList.remove('active'));
                    customPfpBtn.classList.add('active');
                    
                    // Preview the uploaded image in the custom button
                    customPfpBtn.innerHTML = `<img src="${src}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                    customPfpBtn.style.borderStyle = 'solid';
                };
                reader.readAsDataURL(file);
            }
        });

        function updateAllPfps(src) {
            displayPfp.src = src;
            menuPfp.src = src;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
