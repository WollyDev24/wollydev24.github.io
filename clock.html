<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Settings Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=M+PLUS+Rounded+1c:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000;
            --fg: #fff;
            --dim: #555;
            --border: #1a1a1a;
            --card: #0d0d0d;
            --accent: #fff;
            --clock-color: #ffffff;
            --font-weight: 700;
            --clock-size: 12rem;
            --clock-opacity: 1;
        }

        .light-mode {
            --bg: #fff;
            --fg: #000;
            --dim: #aaa;
            --border: #e8e8e8;
            --card: #f5f5f5;
            --accent: #000;
            --clock-color: #000000;
        }

        body {
            background-color: var(--bg);
            color: var(--clock-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            margin: 0;
            overflow: hidden;
            position: relative;
            transition: background-color 0.3s;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, var(--border) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: -1;
            pointer-events: none;
        }

        body.has-bg::before {
            display: none;
        }

        body.solid-bg {
            background-color: #000 !important;
        }
        body.solid-bg::before {
            display: none;
        }
        .light-mode.solid-bg {
            background-color: #000 !important;
        }

        #bg-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            transition: opacity 0.8s ease;
            opacity: 0;
        }

        #bg-image-layer.active {
            opacity: 1;
        }

        #bg-image-layer::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .theme-toggle {
            position: fixed;
            top: 28px;
            right: 82px;
            z-index: 300;
            cursor: pointer;
            font-size: 1.3rem;
            color: var(--fg);
            opacity: 0.4;
            transition: opacity 0.2s, transform 0.2s;
            line-height: 1;
            font-family: 'Inter', sans-serif;
            background: none;
            border: none;
            outline: none;
        }

        .theme-toggle:hover {
            opacity: 0.8;
            transform: scale(1.15);
        }

        .container {
            text-align: center;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            width: 100%;
            max-width: 100%;
            padding: 20px;
            z-index: 1;
        }

        .glyph-row {
            color: var(--dim);
            font-size: 0.6rem;
            letter-spacing: 0.5em;
            font-family: 'Space Mono', monospace;
            opacity: 0.5;
            margin-bottom: 0.25rem;
            pointer-events: none;
        }

        #date {
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
            opacity: 0.6;
            font-family: 'Space Mono', 'M PLUS Rounded 1c', monospace;
            letter-spacing: 0.05em;
            font-weight: 400;
            color: var(--clock-color);
        }

        #clock {
            font-size: var(--clock-size);
            font-weight: var(--font-weight);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            opacity: var(--clock-opacity);
            white-space: nowrap;
            display: inline-block;
            font-family: 'Space Mono', 'M PLUS Rounded 1c', monospace;
        }

        .seconds {
            font-size: 0.45em;
            opacity: 0.5;
            margin-left: 0.05em;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 18px;
            width: 420px;
            max-width: 90vw;
            transition: border-color 0.3s, width 0.3s;
            margin-top: 0.75rem;
        }

        .search-container:focus-within {
            width: 520px;
            border-color: var(--dim);
        }

        .google-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        #search-input {
            background: none;
            border: none;
            color: var(--fg);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            width: 100%;
            outline: none;
        }

        #search-input::placeholder {
            color: var(--dim);
        }

        .dot-badge {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--dim);
            border-radius: 50%;
            vertical-align: middle;
            flex-shrink: 0;
        }

        /* --- Account Switcher UI --- */
        .account-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
        }

        .account-container {
            width: 38px;
            height: 38px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pfp {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid var(--border);
            z-index: 2;
        }

        .g1-ring {
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            border: 1.5px solid var(--dim);
            opacity: 0;
            transition: opacity 0.3s, border-color 0.3s;
        }

        .g1-ring.active {
            opacity: 1;
            border-color: var(--fg);
        }

        .account-menu {
            position: absolute;
            top: 50px;
            right: 0;
            width: 260px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 18px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px);
            transition: all 0.3s ease;
            color: var(--fg);
        }

        .account-wrapper:hover .account-menu {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .menu-header { display: flex; align-items: center; gap: 14px; }
        .menu-pfp { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .menu-info { display: flex; flex-direction: column; gap: 2px; }
        .menu-name { font-weight: 600; font-size: 0.95rem; }
        .menu-email { font-size: 0.7rem; color: var(--dim); }
        .dot-divider { border: none; border-top: 1px dotted var(--border); margin: 14px 0; }
        .menu-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; transition: background 0.15s; color: var(--fg); }
        .menu-item:hover { background: var(--border); }

        /* --- Settings UI --- */
        .settings-wrapper {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            z-index: 100;
        }

        .gear-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            cursor: pointer;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: border-color 0.2s;
        }

        .gear-container:hover {
            border-color: var(--dim);
        }

        .gear-icon {
            width: 22px;
            height: 22px;
            opacity: 0.4;
            transition: opacity 0.3s, transform 0.5s;
            fill: var(--fg);
        }

        .gear-container:hover .gear-icon {
            opacity: 0.8;
            transform: rotate(90deg);
        }

        .settings-panel {
            background: var(--card);
            padding: 20px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
            transition: all 0.3s ease;
            color: var(--fg);
            font-size: 0.8rem;
            border: 1px solid var(--border);
            box-shadow: 0 16px 32px rgba(0,0,0,0.5);
            width: 270px;
            max-height: 80vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .settings-panel::-webkit-scrollbar { display: none; }

        .settings-wrapper.force-show .settings-panel {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .settings-header {
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-bottom: 8px;
            border-bottom: 1px dotted var(--border);
            color: var(--dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .setting-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--dim);
            font-weight: 500;
        }
        .checkbox-item label {
            font-size: 0.7rem;
            text-transform: none;
            letter-spacing: 0;
            color: var(--fg);
            opacity: 0.8;
        }

        .value-display {
            font-size: 0.65rem;
            font-family: 'Space Mono', monospace;
            color: var(--dim);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 3px;
            background: var(--border);
            border-radius: 0;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--fg);
            cursor: pointer;
            border-radius: 0;
        }

        .color-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 4px;
        }

        .color-swatch {
            width: 20px;
            height: 20px;
            cursor: pointer;
            border: 1.5px solid var(--border);
            transition: all 0.2s;
        }

        .color-swatch.active {
            border-color: var(--fg);
        }

        .color-swatch:not(.active):hover {
            border-color: var(--dim);
        }

        .checkbox-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 4px;
            transition: background 0.15s;
            color: var(--fg);
        }

        .checkbox-item:hover {
            background: var(--border);
        }

        .checkbox-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border: 1.5px solid var(--dim);
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .checkbox-item input[type="checkbox"]:checked {
            background: var(--fg);
            border-color: var(--fg);
        }

        .checkbox-item input[type="checkbox"]:checked::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--bg);
        }

        .profile-input {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px 10px;
            color: var(--fg);
            width: 100%;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            transition: border-color 0.2s;
        }

        .profile-input:focus {
            border-color: var(--dim);
        }

        .profile-input::placeholder {
            color: var(--dim);
        }

        .pfp-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .pfp-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 1.5px solid var(--border);
            transition: border-color 0.2s;
        }

        .pfp-option.active {
            border-color: var(--fg);
        }

        .pfp-option:not(.active):hover {
            border-color: var(--dim);
        }

        .custom-pfp-trigger {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1.5px dashed var(--dim);
            border-radius: 50%;
        }

        .btn-remove {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            color: var(--fg);
            transition: background 0.15s, border-color 0.15s;
        }

        .btn-remove:hover {
            border-color: #ff5f5f;
            color: #ff5f5f;
        }

        .btn-remove svg path {
            fill: currentColor;
        }

        @media (max-width: 768px) {
            :root { --clock-size: clamp(3rem, 18vw, 7rem); }
            #date { font-size: 1rem; }
            .theme-toggle { top: 18px; right: 70px; font-size: 1.1rem; }
            .search-container { width: 90vw; padding: 8px 14px; }
            .search-container:focus-within { width: 95vw; }
            #search-input { font-size: 0.9rem; }
            .account-wrapper { top: 14px; right: 14px; }
            .account-menu { position: fixed; top: 60px; right: 14px; left: 14px; width: auto; }
            .settings-wrapper { bottom: 14px; left: 14px; }
            .settings-panel { position: fixed; bottom: 70px; left: 14px; right: 14px; width: auto; max-height: 60vh; }
            .glyph-row { font-size: 0.45rem; }
        }

        @media (max-width: 768px) and (hover: none) {
            .account-menu {
                opacity: 0;
                pointer-events: none;
            }
            .account-menu.open {
                opacity: 1;
                pointer-events: all;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div id="bg-image-layer"></div>

    <button class="theme-toggle" id="theme-toggle">○</button>

    <div class="account-wrapper">
        <div class="account-container" id="account-trigger">
            <div class="g1-ring" id="g1-ring"></div>
            <img src="pictures/picture.jpg" class="pfp" id="display-pfp" alt="Profile">
        </div>
        <div class="account-menu">
            <div class="menu-header">
                <img src="pictures/picture.jpg" class="menu-pfp" id="menu-pfp" alt="Profile">
                <div class="menu-info">
                    <div class="menu-name" id="display-name">Wolly</div>
                    <div class="menu-email">Personal Account</div>
                </div>
            </div>
            <hr class="dot-divider">
            <div class="menu-item" id="edit-profile-btn">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                Manage Profile
            </div>
        </div>
    </div>

    <div class="container">
        <div class="glyph-row">············</div>
        <div id="date">Monday, April 13</div>
        <div id="clock">00:00<span class="seconds">00</span></div>
        <div class="search-container">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <input type="text" id="search-input" placeholder="Search Google..." autocomplete="off">
        </div>
    </div>

    <div class="settings-wrapper">
        <div class="gear-container">
            <svg class="gear-icon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.91,7.62,6.29L5.23,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.72,8.87 c-0.11,0.21-0.06,0.47,0.12,0.61l2.03,1.58C4.84,11.36,4.81,11.68,4.81,12c0,0.32,0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.11-0.21,0.06-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </div>

        <div class="settings-panel">
            <div class="settings-header"><span class="dot-badge"></span> Profile Settings</div>
            <div class="setting-item">
                <label>Display Name</label>
                <input type="text" id="name-input" class="profile-input" placeholder="Wolly">
            </div>
            <div class="setting-item">
                <label>Profile Picture</label>
                <div class="pfp-grid">
                    <img src="pictures/picture.jpg" class="pfp-option active" data-src="pictures/picture.jpg" title="Default">
                    <img src="pictures/telegram_icon.jpg" class="pfp-option" data-src="pictures/telegram_icon.jpg" title="Telegram">
                    <img src="pictures/s8.png" class="pfp-option" data-src="pictures/s8.png" title="S8">
                    <img src="pictures/s8plus.png" class="pfp-option" data-src="pictures/s8plus.png" title="S8+">
                    <div class="pfp-option custom-pfp-trigger" id="custom-pfp-btn" title="Upload Custom">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </div>
                </div>
                <input type="file" id="pfp-upload" accept="image/*" style="display: none;">
            </div>
            <div class="setting-item">
                <div class="checkbox-item">
                    <input type="checkbox" id="g1-toggle">
                    <label for="g1-toggle">Google One Ring</label>
                </div>
            </div>

            <hr class="dot-divider">
            <div class="settings-header"><span class="dot-badge"></span> Background Settings</div>
            <div class="setting-item">
                <div class="checkbox-row">
                    <div class="checkbox-item" id="bg-upload-btn" title="Upload Image">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                        <label>Image</label>
                    </div>
                    <div class="checkbox-item" id="solid-bg-toggle">
                        <input type="checkbox" id="solid-bg-check">
                        <label for="solid-bg-check">Black</label>
                    </div>
                </div>
                <div id="bg-remove-btn" class="btn-remove" style="display: none; margin-top: 6px;">
                    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    Remove Image
                </div>
                <input type="file" id="bg-upload" accept="image/*" style="display: none;">
            </div>

            <hr class="dot-divider">
            <div class="settings-header"><span class="dot-badge"></span> Clock Settings</div>
            <div class="setting-item">
                <div class="setting-label-row"><label>Thickness</label><span class="value-display" id="weight-val">Bold</span></div>
                <input type="range" id="weight-slider" min="0" max="3" step="1" value="2">
            </div>
            <div class="setting-item">
                <div class="setting-label-row"><label>Size</label><span class="value-display" id="size-val">12rem</span></div>
                <input type="range" id="size-slider" min="5" max="25" step="0.5" value="12">
            </div>
            <div class="setting-item">
                <div class="setting-label-row"><label>Opacity</label><span class="value-display" id="opacity-val">100%</span></div>
                <input type="range" id="opacity-slider" min="10" max="100" step="5" value="100">
            </div>
            <div class="setting-item">
                <div class="setting-label-row"><label>Color</label><span class="value-display" id="color-val">White</span></div>
                <div class="color-presets">
                    <div class="color-swatch active" style="background: #fff;" data-color="#ffffff" title="White"></div>
                    <div class="color-swatch" style="background: #ff5f5f;" data-color="#ff5f5f" title="Sunset"></div>
                    <div class="color-swatch" style="background: #5fffaf;" data-color="#5fffaf" title="Mint"></div>
                    <div class="color-swatch" style="background: #5fafff;" data-color="#5fafff" title="Sky"></div>
                    <div class="color-swatch" style="background: #af5fff;" data-color="#af5fff" title="Lavender"></div>
                    <div class="color-swatch" style="background: #fffb5f;" data-color="#fffb5f" title="Gold"></div>
                    <div class="color-swatch" id="custom-color-btn" style="background: linear-gradient(45deg, #ff0000, #ff00ff, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000);" title="Custom"></div>
                </div>
                <input type="color" id="color-picker" style="display: none;">
            </div>
            <div class="checkbox-row">
                <div class="checkbox-item"><input type="checkbox" id="date-toggle" checked><label for="date-toggle">Date</label></div>
                <div class="checkbox-item"><input type="checkbox" id="seconds-toggle" checked><label for="seconds-toggle">Seconds</label></div>
                <div class="checkbox-item"><input type="checkbox" id="format-toggle" checked><label for="format-toggle">24h</label></div>
            </div>
        </div>
    </div>

    <script>
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const weightSlider = document.getElementById('weight-slider');
        const weightVal = document.getElementById('weight-val');
        const sizeSlider = document.getElementById('size-slider');
        const sizeVal = document.getElementById('size-val');
        const opacitySlider = document.getElementById('opacity-slider');
        const opacityVal = document.getElementById('opacity-val');
        const colorPicker = document.getElementById('color-picker');
        const colorValSpan = document.getElementById('color-val');
        const colorSwatches = document.querySelectorAll('.color-swatch');
        const customColorBtn = document.getElementById('custom-color-btn');
        const dateToggle = document.getElementById('date-toggle');
        const secondsToggle = document.getElementById('seconds-toggle');
        const formatToggle = document.getElementById('format-toggle');
        const searchInput = document.getElementById('search-input');
        const nameInput = document.getElementById('name-input');
        const g1Toggle = document.getElementById('g1-toggle');
        const displayName = document.getElementById('display-name');
        const g1Ring = document.getElementById('g1-ring');
        const editProfileBtn = document.getElementById('edit-profile-btn');
        const pfpOptions = document.querySelectorAll('.pfp-option');
        const displayPfp = document.getElementById('display-pfp');
        const menuPfp = document.getElementById('menu-pfp');
        const gearContainer = document.querySelector('.gear-container');
        const settingsWrapper = document.querySelector('.settings-wrapper');
        const bgUpload = document.getElementById('bg-upload');
        const bgUploadBtn = document.getElementById('bg-upload-btn');
        const bgRemoveBtn = document.getElementById('bg-remove-btn');
        const bgLayer = document.getElementById('bg-image-layer');
        const solidBgCheck = document.getElementById('solid-bg-check');
        const pfpUpload = document.getElementById('pfp-upload');
        const customPfpBtn = document.getElementById('custom-pfp-btn');
        const themeToggle = document.getElementById('theme-toggle');

        const weights = [300, 400, 700, 800];
        const weightNames = ['Light', 'Regular', 'Bold', 'Black'];

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            let ampmHtml = '';
            if (!formatToggle.checked) {
                const ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12 || 12;
                ampmHtml = `<span class="seconds" style="margin-left: 10px; font-size: 0.35em;">${ampm}</span>`;
            }
            const hStr = String(h).padStart(2, '0');
            let secondsHtml = secondsToggle.checked ? `<span class="seconds">${s}</span>` : '';
            clockEl.innerHTML = `${hStr}:${m}${secondsHtml}${ampmHtml}`;
            dateEl.innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function saveSettings() {
            const settings = {
                weight: weightSlider.value,
                size: sizeSlider.value,
                opacity: opacitySlider.value,
                color: document.documentElement.style.getPropertyValue('--clock-color'),
                colorName: colorValSpan.innerText,
                dateShow: dateToggle.checked,
                secondsShow: secondsToggle.checked,
                format24h: formatToggle.checked,
                name: nameInput.value,
                g1Ring: g1Toggle.checked,
                pfp: displayPfp.src,
                solidBg: solidBgCheck.checked
            };
            localStorage.setItem('clockAppState', JSON.stringify(settings));
        }

        function loadSettings() {
            const saved = localStorage.getItem('clockAppState');
            if (!saved) return;
            const s = JSON.parse(saved);

            weightSlider.value = s.weight;
            document.documentElement.style.setProperty('--font-weight', weights[s.weight]);
            weightVal.innerText = weightNames[s.weight];

            sizeSlider.value = s.size;
            document.documentElement.style.setProperty('--clock-size', s.size + 'rem');
            sizeVal.innerText = s.size + 'rem';

            opacitySlider.value = s.opacity;
            document.documentElement.style.setProperty('--clock-opacity', s.opacity / 100);
            opacityVal.innerText = s.opacity + '%';

            if (s.color) {
                document.documentElement.style.setProperty('--clock-color', s.color);
                colorValSpan.innerText = s.colorName || 'Custom';
                colorSwatches.forEach(sw => {
                    sw.classList.toggle('active', sw.dataset.color === s.color);
                });
            }

            dateToggle.checked = s.dateShow;
            dateEl.style.display = s.dateShow ? 'block' : 'none';
            secondsToggle.checked = s.secondsShow;
            formatToggle.checked = s.format24h;

            nameInput.value = s.name || '';
            displayName.innerText = s.name || 'Wolly';
            g1Toggle.checked = s.g1Ring;
            g1Ring.classList.toggle('active', s.g1Ring);
            if (s.pfp) {
                displayPfp.src = menuPfp.src = s.pfp;
                pfpOptions.forEach(opt => opt.classList.toggle('active', opt.dataset.src === s.pfp));
            }

            solidBgCheck.checked = s.solidBg;
            document.body.classList.toggle('solid-bg', s.solidBg);

            const savedWallpaper = localStorage.getItem('clockWallpaper');
            if (savedWallpaper) {
                bgLayer.style.backgroundImage = `url(${savedWallpaper})`;
                bgLayer.classList.add('active');
                bgRemoveBtn.style.display = 'flex';
                document.body.classList.add('has-bg');
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            themeToggle.textContent = document.body.classList.contains('light-mode') ? '●' : '○';
            localStorage.setItem('clockTheme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        weightSlider.addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--font-weight', weights[e.target.value]);
            weightVal.innerText = weightNames[e.target.value];
            saveSettings();
        });

        sizeSlider.addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--clock-size', e.target.value + 'rem');
            sizeVal.innerText = e.target.value + 'rem';
            saveSettings();
        });

        opacitySlider.addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--clock-opacity', e.target.value / 100);
            opacityVal.innerText = e.target.value + '%';
            saveSettings();
        });

        colorSwatches.forEach(swatch => {
            swatch.addEventListener('click', () => {
                if (swatch.id === 'custom-color-btn') colorPicker.click();
                else {
                    document.documentElement.style.setProperty('--clock-color', swatch.dataset.color);
                    colorValSpan.innerText = swatch.title;
                    colorSwatches.forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    saveSettings();
                }
            });
        });

        colorPicker.addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--clock-color', e.target.value);
            colorValSpan.innerText = 'Custom';
            colorSwatches.forEach(s => s.classList.remove('active'));
            customColorBtn.classList.add('active');
            saveSettings();
        });

        dateToggle.addEventListener('change', () => {
            dateEl.style.display = dateToggle.checked ? 'block' : 'none';
            saveSettings();
        });

        secondsToggle.addEventListener('change', () => { updateClock(); saveSettings(); });
        formatToggle.addEventListener('change', () => { updateClock(); saveSettings(); });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== '') {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(e.target.value)}`;
            }
        });

        bgUploadBtn.addEventListener('click', () => bgUpload.click());
        bgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const src = event.target.result;
                    bgLayer.style.backgroundImage = `url(${src})`;
                    bgLayer.classList.add('active');
                    bgRemoveBtn.style.display = 'flex';
                    document.body.classList.add('has-bg');
                    localStorage.setItem('clockWallpaper', src);
                    saveSettings();
                };
                reader.readAsDataURL(file);
            }
        });

        bgRemoveBtn.addEventListener('click', () => {
            bgLayer.style.backgroundImage = 'none';
            bgLayer.classList.remove('active');
            bgRemoveBtn.style.display = 'none';
            bgUpload.value = '';
            document.body.classList.remove('has-bg');
            localStorage.removeItem('clockWallpaper');
            saveSettings();
        });

        solidBgCheck.addEventListener('change', () => {
            document.body.classList.toggle('solid-bg', solidBgCheck.checked);
            saveSettings();
        });

        nameInput.addEventListener('input', () => {
            displayName.innerText = nameInput.value || 'Wolly';
            saveSettings();
        });

        g1Toggle.addEventListener('change', () => {
            g1Ring.classList.toggle('active', g1Toggle.checked);
            saveSettings();
        });

        editProfileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsWrapper.classList.add('force-show');
            setTimeout(() => nameInput.focus(), 100);
        });

        gearContainer.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsWrapper.classList.toggle('force-show');
        });

        document.addEventListener('click', (e) => {
            if (!settingsWrapper.contains(e.target)) settingsWrapper.classList.remove('force-show');
        });

        pfpOptions.forEach(option => {
            option.addEventListener('click', () => {
                if (option.id === 'custom-pfp-btn') pfpUpload.click();
                else {
                    displayPfp.src = menuPfp.src = option.dataset.src;
                    pfpOptions.forEach(opt => opt.classList.remove('active'));
                    option.classList.add('active');
                    saveSettings();
                }
            });
        });

        pfpUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const src = event.target.result;
                    displayPfp.src = menuPfp.src = src;
                    pfpOptions.forEach(opt => opt.classList.remove('active'));
                    customPfpBtn.classList.add('active');
                    customPfpBtn.innerHTML = `<img src="${src}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                    saveSettings();
                };
                reader.readAsDataURL(file);
            }
        });

        themeToggle.addEventListener('click', toggleTheme);

        const savedTheme = localStorage.getItem('clockTheme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            themeToggle.textContent = '●';
        }

        loadSettings();
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
