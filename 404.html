<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page not found</title>
  <meta name="description" content="The page you are looking for does not exist." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #000; --fg: #fff; --dim: #555; --border: #1a1a1a; --card: #0d0d0d; --accent: #fff; }
    .light-mode { --bg: #fff; --fg: #000; --dim: #aaa; --border: #e8e8e8; --card: #f5f5f5; --accent: #000; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      background: var(--bg); color: var(--fg);
      line-height: 1.6; -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; transition: background .3s, color .3s;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
      background-size: 24px 24px; z-index: 0; pointer-events: none;
    }
    .container {
      max-width: 460px; width: 100%; position: relative; z-index: 1;
      text-align: center; animation: fadeUp .6s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes dotPulse { 0%,100% { opacity: 1; } 50% { opacity: .2; } }
    .glyph {
      display: flex; justify-content: center; gap: 6px; margin-bottom: 24px;
    }
    .glyph span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--fg);
    }
    .glyph span:nth-child(1) { animation: dotPulse 2s ease infinite; }
    .glyph span:nth-child(2) { animation: dotPulse 2s ease infinite .3s; }
    .glyph span:nth-child(3) { animation: dotPulse 2s ease infinite .6s; }
    .glyph span:nth-child(4) { animation: dotPulse 2s ease infinite .9s; }
    .glyph span:nth-child(5) { animation: dotPulse 2s ease infinite 1.2s; }
    .badge {
      display: inline-block;
      font-family: Space Mono, monospace;
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--dim); margin-bottom: 16px;
    }
    .badge span { color: var(--fg); }
    h1 {
      font-family: Space Mono, monospace;
      font-size: 28px; font-weight: 400;
      text-transform: uppercase; letter-spacing: -.5px;
      margin-bottom: 12px;
    }
    p { font-size: 14px; color: var(--dim); margin-bottom: 32px; }
    .btn {
      display: inline-block;
      text-decoration: none; color: var(--bg); background: var(--fg);
      font-family: Space Mono, monospace; font-size: 12px;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 12px 28px; border-radius: 100px;
      transition: opacity .2s, transform .2s;
    }
    .btn:hover { opacity: .8; transform: translateY(-2px); }
    .btn:active { transform: scale(.95); }
    .dot-divider {
      display: flex; justify-content: center; gap: 8px; margin-top: 40px;
    }
    .dot-divider span {
      width: 3px; height: 3px; border-radius: 50%; background: var(--dim); opacity: .4;
    }
    .cr {
      font-family: Space Mono, monospace;
      font-size: 11px; color: var(--dim); margin-top: 16px;
    }
    #theme {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      background: var(--card); border: 1px solid var(--border);
      color: var(--dim); width: 38px; height: 38px;
      border-radius: 50%; cursor: pointer;
      font-family: Space Mono, monospace; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, color .2s, transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    #theme:hover { color: var(--fg); transform: scale(1.1); }
  </style>
</head>
<body>
  <button id="theme" onclick="toggleTheme()">&#x25CB;</button>
  <div class="container">
    <div class="glyph"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="badge"><span>404</span> &middot; error</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn">Go back home</a>
    <div class="dot-divider"><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="cr">&copy; 2026 WollyDev24</div>
  </div>
  <script>
    function toggleTheme() {
      var light = document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', light ? 'light' : 'dark');
      document.getElementById('theme').innerHTML = light ? '&#x25CF;' : '&#x25CB;';
    }
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light-mode');
      document.getElementById('theme').innerHTML = '&#x25CF;';
    }
  </script>
</body>
</html>
