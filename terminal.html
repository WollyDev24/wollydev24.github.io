<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Terminal Style Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#000;--fg:#fff;--dim:#555;--border:#1a1a1a;--card:#0d0d0d;--accent:#fff}
    .light-mode{--bg:#fff;--fg:#000;--dim:#aaa;--border:#e8e8e8;--card:#f5f5f5;--accent:#000}
    html,body{height:100%}
    body{
      font-family:Inter,-apple-system,sans-serif;
      background:var(--bg);color:var(--fg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:2rem;position:relative;min-height:100vh;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);
      background-size:24px 24px;
      pointer-events:none;z-index:0;
    }
    .theme-toggle{
      position:fixed;top:20px;right:20px;z-index:100;
      width:40px;height:40px;border-radius:50%;
      background:var(--card);border:1px solid var(--border);
      color:var(--fg);cursor:pointer;
      font-size:18px;display:flex;align-items:center;justify-content:center;
      transition:.2s ease;
    }
    .theme-toggle:hover{border-color:var(--dim)}
    .dot-badge{
      position:relative;z-index:1;
      display:flex;align-items:center;gap:8px;
      font-family:'Space Mono',monospace;font-size:11px;
      text-transform:uppercase;letter-spacing:.15em;
      color:var(--dim);margin-bottom:12px;
    }
    .dot-badge::before{
      content:'';width:6px;height:6px;border-radius:50%;background:var(--fg);
    }
    .terminal{
      position:relative;z-index:1;
      width:min(1000px,96%);max-width:1200px;
      background:var(--card);border-radius:16px;padding:24px;
      border:1px solid var(--border);
    }
    .titlebar{display:flex;gap:8px;align-items:center;margin-bottom:16px}
    .dots{display:flex;gap:6px}
    .dot{width:12px;height:12px;border-radius:50%;opacity:.9}
    .dot.r{background:#ff5f56}
    .dot.y{background:#ffbd2e}
    .dot.g{background:#27c93f}
    .titlebar-text{font-family:'Space Mono',monospace;font-size:13px;color:var(--dim);margin-left:8px}
    #screen{
      font-family:'Space Mono',monospace;
      white-space:pre;overflow:auto;
      margin:0;padding:14px;background:var(--bg);
      border-radius:8px;color:var(--fg);line-height:1.15;font-size:14px;
      border:1px solid var(--border);min-height:120px;
    }
    .muted{color:var(--dim)}
    #cmd{
      background:var(--bg);border:1px solid var(--border);
      outline:none;color:var(--fg);
      font-family:'Space Mono',monospace;font-size:14px;
      width:100%;padding:10px 14px;border-radius:8px;margin-top:10px;
      transition:.2s ease;
    }
    #cmd:focus{border-color:var(--dim)}
    #cmd::placeholder{color:var(--dim)}
    .controls{margin-top:12px;display:flex;gap:8px}
    .controls button{
      background:transparent;border:1px solid var(--border);
      padding:7px 14px;border-radius:8px;
      color:var(--fg);cursor:pointer;
      font-family:Inter,-apple-system,sans-serif;
      font-size:13px;transition:.2s ease;
    }
    .controls button:hover{border-color:var(--dim);background:var(--border)}
    footer.hint{
      margin-top:16px;color:var(--dim);
      font-size:12px;font-family:'Space Mono',monospace;
    }
    .dot-divider{
      position:relative;z-index:1;
      display:flex;justify-content:center;gap:6px;margin-top:16px;
    }
    .dot-divider span{width:4px;height:4px;border-radius:50%;background:var(--dim)}
    @media(max-width:500px){
      body{padding:1rem}
      #screen{font-size:12px;padding:10px}
      #cmd{font-size:12px;padding:8px 12px}
      .terminal{padding:16px}
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">○</button>
  <div class="dot-badge">terminal session</div>
  <div class="terminal" role="region" aria-label="Terminal">
    <div class="titlebar">
      <div class="dots">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
      </div>
      <div class="titlebar-text">user@webshell:~$</div>
    </div>
    <pre id="screen" aria-live="polite">Hello! type 'run' to start</pre>
    <input id="cmd" type="text" placeholder="type command here..." autofocus />
    <div class="controls">
      <button id="skip">Show instantly</button>
      <button id="clear">Clear</button>
    </div>
    <footer class="hint">Tyoe "run" or "list projects/devices/giveaway"</footer>
  </div>
  <div class="dot-divider"><span></span><span></span><span></span><span></span><span></span></div>
  <script>
    function toggleTheme(){
      document.body.classList.toggle('light-mode');
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = document.body.classList.contains('light-mode') ? '●' : '○';
      localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    if(localStorage.getItem('theme') === 'light'){
      document.body.classList.add('light-mode');
      document.querySelector('.theme-toggle').textContent = '●';
    }

    const screen = document.getElementById('screen');
    const cmd = document.getElementById('cmd');
    const skipBtn = document.getElementById('skip');
    const clearBtn = document.getElementById('clear');

    const introLines = [
      'Booting web-terminal...\n',
      'Loading modules: [ok] [ok] [ok]\n',
      'Welcome, user! Animation starting...\n\n'
    ];

    let typing = false;

    async function fetchData(type){
      try{
        const res = await fetch(`https://wollydev24.github.io/data/${type}.json`);
        if(!res.ok) throw new Error('Fetch failed');
        const data = await res.json();
        return data;
      }catch(e){
        return {error:true, message:`Could not load ${type}`};
      }
    }

    function print(text){
      screen.textContent += text + '\n';
      screen.scrollTop = screen.scrollHeight;
    }

    function typeAll(lines, opts={speed:20}){
      typing=true;
      screen.textContent='';
      const full = lines.join('') + '\nuser@webshell:~$ ';
      let i=0;
      function step(){
        if(i>=full.length){typing=false;return}
        screen.textContent += full[i++];
        screen.scrollTop = screen.scrollHeight;
        setTimeout(step, opts.speed);
      }
      step();
    }

    function showInstant(){
      typing=false;
      screen.textContent = introLines.join('') + '\nuser@webshell:~$ ';
      screen.scrollTop = screen.scrollHeight;
    }

    async function handleCommand(value){
      const args = value.split(' ');
      const cmd = args[0];

      switch(cmd){
        case 'run':
          if(!typing) typeAll(introLines,{speed:12});
          break;
        case 'list':
          const type = args[1];
          if(['projects','giveaway','devices'].includes(type)){
            print(`Fetching ${type}...`);
            const data = await fetchData(type);
            if(data.error){
              print(data.message);
            } else {
              print(JSON.stringify(data, null, 2));
            }
          } else {
            print('Usage: list [projects|giveaway|devices]');
          }
          break;
        default:
          print(`${value}: command not found`);
      }
      print('user@webshell:~$ ');
    }

    cmd.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        const value = cmd.value.trim().toLowerCase();
        cmd.value='';
        handleCommand(value);
      }
    });

    skipBtn.addEventListener('click', ()=>{ showInstant(); });
    clearBtn.addEventListener('click', ()=>{ screen.textContent='user@webshell:~$ '; });
  </script>
</body>
</html>
